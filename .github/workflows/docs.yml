name: Build and Deploy Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow only one concurrent deployment; cancel in-progress runs from older pushes.
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so setuptools_scm can determine the version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install documentation dependencies
        # Install only the 'docs' extras — avoids importing heavy/private deps at build time.
        # sphinx-autoapi reads source code statically, so the package itself does not
        # need to be importable.
        # setuptools_scm is needed so conf.py can read the version from git tags.
        run: |
          pip install --upgrade pip
          pip install \
            sphinx \
            furo \
            myst-parser \
            sphinx-autoapi \
            sphinx-copybutton \
            setuptools_scm

      - name: Build HTML docs
        run: sphinx-build -W --keep-going -b html docs docs/_build/html
        # -W: treat warnings as errors (catches broken references early)
        # --keep-going: report all errors, not just the first one

      - name: Upload built docs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html/
          retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    # Only deploy on pushes to main (not on pull requests)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # Grant write permission to push to gh-pages branch
    permissions:
      contents: write

    steps:
      - name: Download built docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
          publish_branch: gh-pages
          force_orphan: true  # keep gh-pages branch clean (only latest build)
